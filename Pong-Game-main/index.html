<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Pong · Dominoes Lakay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="pong-shell">
        <section class="pong-card">
            <header class="pong-head">
                <div>
                    <p class="eyebrow">Arcade</p>
                    <h1>Pong</h1>
                    <p class="sub">Premier a 3 points. Compte a rebours a chaque manche.</p>
                </div>
                <div class="score-wrap" aria-live="polite">
                    <div class="score-block">
                        <span class="score-label">Toi</span>
                        <strong id="leftScore">0</strong>
                    </div>
                    <span class="score-sep">:</span>
                    <div class="score-block">
                        <span id="rightPlayerLabel" class="score-label">Adversaire</span>
                        <strong id="rightScore">0</strong>
                    </div>
                </div>
            </header>
            <p id="matchStatus" class="match-status" aria-live="polite">Preparation de la partie...</p>

            <div class="canvas-wrap">
                <canvas id="pong" width="800" height="500" aria-label="Zone de jeu Pong"></canvas>
            </div>

            <footer class="pong-actions">
                <button id="friendBtn" type="button">Jouer avec un ami</button>
                <button id="replayBtn" type="button" class="hidden">Nouvelle partie</button>
            </footer>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
