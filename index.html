    <script>
      (() => {
        const storageKey = "dl_welcome_deposit_flow_v2";
        const modal = document.getElementById("welcomeDepositModal");
        if (!modal) return;
        const closeButtons = modal.querySelectorAll("[data-close]");
        const badgeEl = document.getElementById("welcomeDepositBadge");
        const titleEl = document.getElementById("welcomeDepositTitle");
        const bodyEl = document.getElementById("welcomeDepositBody");
        const agentBtn = document.getElementById("welcomeDepositAgent");
        const primaryBtn = document.getElementById("welcomeDepositPrimary");
        const secondaryBtn = document.getElementById("welcomeDepositSecondary");

        const steps = [
          {
            badge: "Bienvenue",
            title: "Championnat Mopyon",
            paragraphs: [
              "Si tu veux t'inscrire au championnat Mopyon, contacte un agent. L'inscription coûte 150 gourdes.",
              "Le vainqueur remportera 5000 gourdes, le 2e 2000 gourdes et le 3e 1000 gourdes.",
            ],
            agent: {
              label: "Contacter un agent",
              href: "https://wa.me/50941752992?text=Bonjour%2C%20je%20veux%20m'inscrire%20au%20championnat%20Mopyon.",
            },
            primary: {
              label: "Intègre le groupe WhatsApp",
              href: "https://chat.whatsapp.com/I8VfW1Tdv6nF1d7ZkMfOg0",
            },
            secondaryLabel: "Suivant",
          },
          {
            badge: "Parrainage",
            title: "Invite un ami et gagne une partie gratuite",
            paragraphs: [
              "Si tu invites un ami et que cet ami fait un dépôt sous ton code, tu gagnes une partie gratuite.",
              "Ton code de parrainage est disponible dans ton profil. Partage-le à tes amis pour profiter de cet avantage.",
            ],
            secondaryLabel: "Suivant",
          },
          {
            badge: "Tournois",
            title: "Tournois: 3 parties par jour",
            paragraphs: [
              "Chaque utilisateur peut jouer seulement 3 tournois par jour.",
              "Une fois les 3 parties utilisées, un compte à rebours s’affiche jusqu’au prochain reset. Le vainqueur du tournoi gagne 1000 Gdes.",
            ],
            secondaryLabel: "J’ai compris",
          },
        ];

        let activeStepIndex = 0;
        const showModal = () => {
          modal.classList.remove("hidden");
          modal.setAttribute("aria-hidden", "false");
        };
        const hideModal = () => {
          modal.classList.add("hidden");
          modal.setAttribute("aria-hidden", "true");
        };
        const renderStep = () => {
          const step = steps[activeStepIndex];
          if (!step || !badgeEl || !titleEl || !bodyEl || !secondaryBtn) return;

          badgeEl.textContent = step.badge || "Bienvenue";
          titleEl.textContent = step.title || "";
          bodyEl.innerHTML = "";
          (step.paragraphs || []).forEach((text) => {
            const paragraph = document.createElement("p");
            paragraph.className = "welcome-modal__text";
            paragraph.textContent = text;
            bodyEl.appendChild(paragraph);
          });

          if (agentBtn && step.agent?.label && step.agent?.href) {
            agentBtn.textContent = step.agent.label;
            agentBtn.href = step.agent.href;
            agentBtn.classList.remove("hidden");
          } else if (agentBtn) {
            agentBtn.textContent = "";
            agentBtn.removeAttribute("href");
            agentBtn.classList.add("hidden");
          }

          if (primaryBtn && step.primary?.label && step.primary?.href) {
            primaryBtn.textContent = step.primary.label;
            primaryBtn.href = step.primary.href;
            primaryBtn.classList.remove("hidden");
          } else if (primaryBtn) {
            primaryBtn.textContent = "";
            primaryBtn.removeAttribute("href");
            primaryBtn.classList.add("hidden");
          }

          secondaryBtn.textContent = step.secondaryLabel || "J’ai compris";
        };
        const goNext = () => {
          if (activeStepIndex < steps.length - 1) {
            activeStepIndex += 1;
            renderStep();
            return;
          }
          hideModal();
        };
        let alreadySeen = false;
        try {
          alreadySeen = localStorage.getItem(storageKey) === "1";
        } catch (err) {
          alreadySeen = false;
        }
        if (!alreadySeen) {
          try {
            localStorage.setItem(storageKey, "1");
          } catch (err) {
            /* ignore */
          }
          renderStep();
          showModal();
        } else {
          modal.setAttribute("aria-hidden", "true");
        }
        closeButtons.forEach((btn) => btn.addEventListener("click", hideModal));
        if (secondaryBtn) secondaryBtn.addEventListener("click", goNext);
      })();
    </script>
