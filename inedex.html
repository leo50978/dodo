    <style>
      @media print {
        @page {
          margin: 12mm;
        }

        html,
        body {
          overflow: visible !important;
          background: #fff !important;
        }

        p,
        li {
          orphans: 3;
          widows: 3;
        }

        section,
        article,
        table,
        tbody,
        tr,
        .card,
        .timeline-item,
        .experience-item,
        .print-avoid-break {
          break-inside: avoid-page;
          page-break-inside: avoid;
        }

        /* Extra guard for right-column CV/resume layouts */
        .right-column,
        .col-right,
        .column-right,
        [class*="right-column"],
        [class*="col-right"] {
          position: static !important;
          float: none !important;
          overflow: visible !important;
        }

        .right-column > *,
        .col-right > *,
        .column-right > *,
        [class*="right-column"] > *,
        [class*="col-right"] > * {
          break-inside: avoid-page;
          page-break-inside: avoid;
        }

        .page-break,
        .page-separator,
        .print-page-break,
        [class*="page-break"] {
          break-before: page;
          page-break-before: always;
          margin-top: 0 !important;
          clear: both !important;
        }

        /* Hide interactive edit overlays in print/PDF (prevents overlap across pages) */
        [data-edit-step],
        [data-edit-step="experiences"] {
          display: none !important;
          visibility: hidden !important;
          position: static !important;
          pointer-events: none !important;
        }
